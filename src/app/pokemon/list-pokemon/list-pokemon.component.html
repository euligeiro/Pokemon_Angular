


<div class=" container">
    <div class='row'>
     <app-search-pokemon></app-search-pokemon>   
        <div *ngFor="let pokemon of pokemonList" class="col m4 s6 ">
            <div (click)="goToPokemon(pokemon)" class="card horizontal" pkmnBorderCard>
                <div class="card-image">
                    <img [src]="pokemon.picture" />
                </div>
            </div>
            <div class="card-stacked">
                <div class="card-content">
                    <p> {{ pokemon.name}}</p>
                    <p> <small> {{pokemon.created | date}}</small></p>
                </div>
            </div>
        </div>

    </div>

</div>

<a class="btn-floating btn-large waves-effect waves-light pink" routerLink="/pokemons/add" style="position: fixed; bottom: 25px; right: 25px">
➕
</a>
