<form *ngIf="pokemon" (ngSubmit)="onsubmit($event)" #pokemonForm="ngForm">
  <div class="row">
    <div class="col s8 offset-s2">
      <div class="card-panel">

        <!-- Pokemon name -->
        <div class="form-group">
          <label for="name">Nom</label>
          <input type="text"
            class="form-control"
            id="name"
            required
            pattern="^[a-zA-Z0-9áéèç]{1,25}$"
            [(ngModel)]="pokemon.name"
            name="name"
            #name="ngModel">
          <div [hidden]="name.valid || name.pristine"
            class="card-panel red accent-1">
            Le nom du pokemon est requis (1-25 caractères)
          </div>
        </div>
        <!-- Pokemon picture -->
        <div *ngIf="isAddForm" class="form-group">
          <label for="picture">Image</label>
          <input type="url"
            class="form-control"
            id="picture"
            required
            [(ngModel)]="pokemon.picture"
            name="picture"
            #picture="ngModel">
          <div [hidden]="picture.valid || picture.pristine"
            class="card-panel red accent-1">
            Le nom de l'image du pokemon est requis
          </div>
        </div>
        <!-- Pokemon hp -->
        <div class="form-group">
          <label for="hp">Points de vie</label>
          <input type="number"
            class="form-control"
            id="hp"
            required
            min="0"
            max="999"
            [(ngModel)]="pokemon.hp"
            name="hp"
            #hp="ngModel">
          <div [hidden]="hp.valid || hp.pristine"
            class="card-panel red accent-1">
            Les points de vie sont requis et doivent être compris entre 0 et
            999.
          </div>
        </div>

        <!-- Pokemon cp -->
        <div class="form-group">
          <label for="cp">Dégâts</label>
          <input type="number"
            class="form-control"
            id="cp"
            required
            min="0"
            max="99"
            [(ngModel)]="pokemon.cp"
            name="cp"
            #cp="ngModel">
          <div [hidden]="cp.valid || cp.pristine"
            class="card-panel red accent-1">
            Les dégâts sont requis et doivent être compris entre 0 et 99.
          </div>
        </div>

        <!-- Pokemon types -->
        <div class="form-group">
          <label>Types</label>
          <p *ngFor="let type of types">
            <label>
              <input type="checkbox"
                class="filled-in"
                [id]="type"
                [value]="type"
                [checked]="hasType(type)"
                [disabled]="!isTypesValid(type)"
                (change)="selectType($event, type)" />
              <span [attr.for]="type">
                <div [class]="'type-' + type | lowercase">
                  {{ type }}
                </div>
              </span>
            </label>
          </p>
        </div>

        <div class="divider"></div>
        <div class="section center">
          <button type="submit"
            class="waves-effect waves-light btn"
            [disabled]="!pokemonForm.form.valid">
            Valider
          </button>
        </div>
      </div>
    </div>
  </div>
</form>
<h3 *ngIf="!pokemon"><app-loader></app-loader></h3>
