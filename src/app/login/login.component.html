<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">🌸 Connexion 🌸</h2>
    
    <div class="message">
      {{ message }}
    </div>

    <form #loginForm="ngForm">
      <div class="form-group">
        <label for="name">Nom d'utilisateur</label>
        <input 
          id="name" 
          type="text" 
          [(ngModel)]="name" 
          name="name" 
          required
          placeholder="pikachu"
          #nameInput="ngModel">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          id="password" 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          required
          placeholder="•••••••"
          #passwordInput="ngModel">
      </div>

      <div class="button-group">
        <button 
          *ngIf="!auth.isLoggedIn" 
          (click)="login()" 
          class="btn-login"
          [disabled]="!loginForm.form.valid">
          Se connecter
        </button>

        <button 
          *ngIf="auth.isLoggedIn" 
          (click)="logout()" 
          class="btn-logout">
          Se déconnecter
        </button>
      </div>
    </form>
  </div>
</div>
